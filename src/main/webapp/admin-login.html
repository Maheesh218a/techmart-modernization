<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TechMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                <i class="bi bi-cpu"></i> TechMart Admin
            </a>
        </div>
    </nav>

    <!-- Admin Login Section -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0" style="background-color: #1e293b;">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                            <h3 class="fw-bold mt-2 text-light">Admin Portal</h3>
                            <p class="text-muted">Restricted Access</p>
                        </div>
                        
                        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

                        <form id="admin-login-form">
                            <div class="mb-3">
                                <label for="email" class="form-label text-light">Administrator Email</label>
                                <input type="email" class="form-control bg-dark text-light border-secondary" id="email" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-light">Password</label>
                                <input type="password" class="form-control bg-dark text-light border-secondary" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Login to Dashboard</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
