<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - TechMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-cpu"></i> TechMart
            </a>
            <div class="d-flex align-items-center ms-auto">
                <div id="user-menu" class="me-3 text-light d-none">
                    <span class="small me-2">Hello, <b id="nav-username">User</b>!</span>
                    <a href="#" class="btn btn-sm btn-outline-light" onclick="logout()">Logout</a>
                </div>
                <div id="login-menu" class="me-3">
                    <a href="login.html" class="btn btn-sm btn-light">Login</a>
                </div>
                <a href="index.html" class="btn btn-outline-light">
                    <i class="bi bi-arrow-left"></i> Continue Shopping
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5 mb-5">
        <h2 class="fw-bold mb-4">Your Shopping Cart</h2>
        
        <div class="row">
            <!-- Cart Items -->
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Product</th>
                                        <th>Price</th>
                                        <th>Quantity</th>
                                        <th class="text-end">Total</th>
                                        <th class="text-center pe-4">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="cart-items-body">
                                    <!-- Cart items injected via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-4">Order Summary</h5>
                        
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Subtotal</span>
                            <span class="fw-bold" id="summary-subtotal">LKR 0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Shipping</span>
                            <span class="fw-bold text-success">Free</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <h5 class="fw-bold">Total</h5>
                            <h5 class="fw-bold text-primary" id="summary-total">LKR 0.00</h5>
                        </div>

                        <!-- Checkout Form -->
                        <form id="checkout-form">
                            <!-- Customer ID is now automatically derived from logged in user -->
                            <div class="mb-3">
                                <label class="form-label text-muted small">Shipping Address</label>
                                <textarea class="form-control" id="shipping-address" rows="2" required placeholder="Enter full address"></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small">Order Notes (Optional)</label>
                                <input type="text" class="form-control" id="order-notes" placeholder="Any special instructions?">
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-2 shadow" id="btn-checkout">
                                <i class="bi bi-credit-card"></i> Place Order Now
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Modal for Order Success -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4 border-0 shadow-lg">
          <div class="modal-body">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            <h3 class="mt-3 fw-bold">Order Placed!</h3>
            <p class="text-muted" id="order-success-msg">Your order was successfully placed. JMS notification has been triggered in the background.</p>
            <button type="button" class="btn btn-primary px-4 mt-2" onclick="window.location.href='index.html'">Return to Shop</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/cart.js"></script>
</body>
</html>
