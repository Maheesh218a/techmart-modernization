<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TechMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow border-bottom border-secondary">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-primary" href="index.html">
                <i class="bi bi-cpu"></i> TechMart Admin
            </a>
            <div class="d-flex align-items-center ms-auto">
                <div class="me-3 text-light">
                    Hello, <span id="nav-username" class="fw-bold">Admin</span>!
                </div>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 mb-4">
                <div class="list-group shadow-sm">
                    <button class="list-group-item list-group-item-action active" id="tab-orders" onclick="switchTab('orders')">
                        <i class="bi bi-cart-check me-2"></i> Manage Orders
                    </button>
                    <button class="list-group-item list-group-item-action" id="tab-products" onclick="switchTab('products')">
                        <i class="bi bi-box-seam me-2"></i> Manage Products
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-10">
                
                <!-- Orders Section -->
                <div id="section-orders" class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-body d-flex justify-content-between align-items-center border-bottom-0 pt-4 pb-0">
                        <h4 class="mb-0 text-primary">All Orders</h4>
                        <button class="btn btn-sm btn-outline-secondary" onclick="fetchOrders()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Date</th>
                                        <th>Customer</th>
                                        <th>Address</th>
                                        <th>Status</th>
                                        <th class="text-end">Total (LKR)</th>
                                    </tr>
                                </thead>
                                <tbody id="orders-tbody">
                                    <tr><td colspan="6" class="text-center text-muted">Loading orders...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Products Section -->
                <div id="section-products" class="card shadow-sm border-0 mb-4 d-none">
                    <div class="card-header bg-body d-flex justify-content-between align-items-center border-bottom-0 pt-4 pb-0">
                        <h4 class="mb-0 text-primary">Product Catalog</h4>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary me-2" onclick="fetchProducts()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                            <button class="btn btn-sm btn-primary" onclick="openAddProductModal()"><i class="bi bi-plus-lg"></i> Add Product</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Image</th>
                                        <th>Name</th>
                                        <th>Category</th>
                                        <th>Stock</th>
                                        <th class="text-end">Price (LKR)</th>
                                        <th class="text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="products-tbody">
                                    <tr><td colspan="7" class="text-center text-muted">Loading products...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Product Modal (Add/Edit) -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title text-primary" id="productModalTitle">Add New Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="product-form">
                        <input type="hidden" id="prod-id">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="prod-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input type="text" class="form-control" id="prod-category" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="prod-desc" rows="2" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price (LKR)</label>
                                <input type="number" step="0.01" min="0" class="form-control" id="prod-price" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" step="1" min="0" class="form-control" id="prod-stock" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="text" class="form-control" id="prod-image" placeholder="e.g., images/laptop1.png">
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="productModalSubmitBtn">Save Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
