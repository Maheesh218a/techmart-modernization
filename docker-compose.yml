version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: techmart_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techmart_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: techmart_app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # These environment variables would be read by Payara to configure the jdbc/techmart connection pool dynamically in the cloud
      - DB_URL=jdbc:mysql://db:3306/techmart_db
      - DB_USER=root
      - DB_PASSWORD=root

volumes:
  db_data:
